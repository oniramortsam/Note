<!DOCTYPE html>
<html lang="it">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Visualizza PDF</title>
        <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: space-between;
            margin: 0;
            padding: 0;
            height: 100vh; /* Altezza completa della finestra */
            background-color: #f4f4f4;
        }
        
        /* Colonna laterale (indice dei PDF) */
        #sidebar {
            width: 20%;
            background-color: #fff;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            overflow-y: auto; /* Scorrimento per liste lunghe */
        }
        
        #sidebar ul {
            list-style-type: none;
            padding: 0;
        }
        
        #sidebar ul li {
            margin: 10px 0;
        }

        #sidebar ul li a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        #sidebar ul li a:hover {
            color: #007bff;
        }
        
        /* Area principale per il PDF */
        #main-content {
            width: 80%;
            background-color: #fff;
            padding: 0;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            height: 100%; /* Riempie tutta l'altezza del body */
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        </style>
    </head>
    <body>
    
    <div id="sidebar">
        <h3>Indice dei PDF</h3>
        <ul>
            <li><a href="#pdf01" onclick="loadPDF('1_Dispense.pdf')">Capitolo 1</a></li>
            <li><a href="#pdf02" onclick="loadPDF('2_Dispense.pdf')">Capitolo 2</a></li>
            <li><a href="#pdf03" onclick="loadPDF('3_Dispense.pdf')">Capitolo 3</a></li>
            <li><a href="#pdf04" onclick="loadPDF('4_Dispense.pdf')">Capitolo 4</a></li>
            <li><a href="#pdf05" onclick="loadPDF('5_Dispense.pdf')">Capitolo 5</a></li>
            <li><a href="#pdf06" onclick="loadPDF('6_Dispense.pdf')">Capitolo 6</a></li>
            <li><a href="#pdf07" onclick="loadPDF('7_Dispense.pdf')">Capitolo 7</a></li>
            <li><a href="#pdf08" onclick="loadPDF('8_Dispense.pdf')">Capitolo 8</a></li>
            <li><a href="#pdf09" onclick="loadPDF('9_Dispense.pdf')">Capitolo 9</a></li>
            <li><a href="#pdf10" onclick="loadPDF('10_Dispense.pdf')">Capitolo 10</a></li>
            <li><a href="#pdf11" onclick="loadPDF('11_Dispense.pdf')">Capitolo 11</a></li>
            <li><a href="#pdf12" onclick="loadPDF('12_Dispense.pdf')">Capitolo 12</a></li>
            <li><a href="#pdf13" onclick="loadPDF('13_Dispense.pdf')">Capitolo 13</a></li>
            <li><a href="#pdf14" onclick="loadPDF('14_Dispense.pdf')">Capitolo 14</a></li>
            <li><a href="#pdf15" onclick="loadPDF('15_Dispense.pdf')">Capitolo 15</a></li>
            <li><a href="#pdf16" onclick="loadPDF('16_Dispense.pdf')">Capitolo 16</a></li>
            <li><a href="#pdf17" onclick="loadPDF('17_Dispense.pdf')">Capitolo 17</a></li>
            <li><a href="main.md">Capitoli</a></li>
        </ul>
    </div>

    <div id="main-content">
        <iframe id="pdf-viewer" src="" title="Visualizzazione PDF"></iframe>
    </div>

    <script>
        function loadPDF(pdfFile) {
            var iframe = document.getElementById('pdf-viewer');
            iframe.src = pdfFile;
        }
    </script>

</body>
</html>
